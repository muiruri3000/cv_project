services:
  db:
    image: postgres:15
    container_name: cv_project-db
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  backend:
    build: ./cv_backend
    container_name: cv_project-backend
    command: /entrypoint.sh
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env

  frontend:
    build: ./my-react-app-parcel
    container_name: cv_project-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  redis:
    image: redis:7
    ports:
      - "6379:6379"
volumes:
  pgdata:
