apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db
  namespace: portfolio-app
spec:
  serviceName: db
  replicas: 1
  selector:
    matchLabels:
      app: db

  template:
    metadata:
      labels:
        app: db

    spec:
      containers:
      - name: db
        image: postgres:15
        ports:
        - containerPort: 5432

        envFrom:
        - secretRef:
            name: postgres-secret
        - configMapRef:
            name: postgres-config

        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data

  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
