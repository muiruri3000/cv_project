apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: portfolio-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: muiruri1/cv-frontend:v16
        ports:
        - containerPort: 80
        env:
        - name: REACT_APP_API_URL
          value: http://backend:8000
