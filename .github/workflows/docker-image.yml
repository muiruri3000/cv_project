name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      localhost:
        image: postgres:15
        env:
          POSTGRES_DB: cv_db
          POSTGRES_USER: cv_user
          POSTGRES_PASSWORD: cvuser12345
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install backend dependencies
        working-directory: cv_backend
        run: |
          pip install -r requirements.txt
      # - name: Wait for Postgres
      #   run: |
      #     export PGPASSWORD=cvuser12345
      #     until pg_isready -h postgres -U cv_user -d cv_db; do
      #       echo "Waiting for Postgres..."
      #       sleep 2
      #     done
      - name: Run Django migrations
        working-directory: cv_backend
        env:
          POSTGRES_DB: cv_db
          POSTGRES_USER: cv_user
          POSTGRES_PASSWORD: cvuser12345
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
        run: |
          python manage.py migrate

      - name: Set Up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: my-react-parcel
        run: |
          npm install

      - name: Build React App
        working-directory: my-react-app-parcel
        run: |
          npm run build
