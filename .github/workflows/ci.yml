name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]


jobs: 
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: posgres:15
        env:
          POSTGRES_DB: cv_db
          POSTGRES_USER: cv_user
          POSTGRES_PASSWORD: postgres
        ports: 
          - 5432:5432
        options: >-
          --health-cm="pg_isready"
          --health-intervals=10s
          --health-timeout=5s
          --health-retries=5
  steps: 
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 
      uses: actions/setup-python@v5
      with:
        python-verson: 3.11
    - name: Install backend dependencies
      working-directory: backend
      run: |
        pip install -r requirements.txt
    
    - name: Run Django migrations
      working-directory: backend
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/cv_db
      run: |
        python manage.py migrate  

# Set up React. 

    - name: Set Up Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
    - name: install frontend dependencies
      working-directory: my-react-app-parcel
      run: |
        npm install

    - name: Build React App
      working-directory: my-react-app-parcel
      run: |
        npm run build